name: Check upstream plugin updates

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Monday at 9am UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for upstream changes
        id: check
        run: |
          MARKETPLACE=".claude-plugin/marketplace.json"
          UPSTREAM_URL="https://github.com/garrytan/gstack.git"
          UPDATED=false

          # Get current HEAD SHA of upstream repo
          UPSTREAM_SHA=$(git ls-remote "$UPSTREAM_URL" HEAD | cut -f1)
          UPSTREAM_SHORT=$(echo "$UPSTREAM_SHA" | cut -c1-7)

          if [ -z "$UPSTREAM_SHA" ]; then
            echo "::error::Failed to fetch upstream SHA from $UPSTREAM_URL"
            exit 1
          fi

          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "upstream_short=$UPSTREAM_SHORT" >> "$GITHUB_OUTPUT"

          # Extract current SHA from marketplace.json (if any)
          CURRENT_SHA=$(jq -r --arg url "$UPSTREAM_URL" '.plugins[] | select((.source | type) == "object" and .source.url == $url) | .source.sha // "none"' "$MARKETPLACE" | head -1)

          echo "Current SHA: $CURRENT_SHA"
          echo "Upstream SHA: $UPSTREAM_SHA"

          if [ "$CURRENT_SHA" = "$UPSTREAM_SHA" ]; then
            echo "No changes detected"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Update all gstack plugin entries with new SHA and version
          TEMP=$(mktemp)
          jq --arg sha "$UPSTREAM_SHA" --arg version "sha-$UPSTREAM_SHORT" --arg url "$UPSTREAM_URL" '
            .plugins |= map(
              if (.source | type) == "object" and .source.url == $url then
                .source.sha = $sha | .version = $version
              else
                .
              end
            )
          ' "$MARKETPLACE" > "$TEMP" && mv "$TEMP" "$MARKETPLACE"

          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.check.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ steps.check.outputs.upstream_short }}"
          BRANCH="auto/bump-gstack-$SHA"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add .claude-plugin/marketplace.json
          git commit -m "Bump gstack plugins to sha-$SHA"
          git push origin "$BRANCH"

          # Check if a PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for this branch"
            exit 0
          fi

          gh pr create \
            --title "Bump gstack plugins to sha-$SHA" \
            --body "$(cat <<'EOF'
          ## Summary
          - Updated all `gstack_*` plugin entries to latest upstream commit
          - Upstream repo: garrytan/gstack
          - New SHA: ${{ steps.check.outputs.upstream_sha }}

          Auto-generated by check-upstream-plugins workflow.
          EOF
          )"
